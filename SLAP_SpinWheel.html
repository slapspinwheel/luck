<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S.L.A.P! Spin & Win</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pink: #ec1e79;
    --pink-dark: #c4106a;
    --cyan: #29c4dc;
    --cyan-dark: #1499ad;
    --lime: #d6e21f;
    --cream: #fff8ec;
    --ink: #241428;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    height:100%;
    background: linear-gradient(180deg, var(--cyan) 0%, var(--cyan-dark) 100%);
    font-family:'Nunito', sans-serif;
    color: var(--ink);
    overflow:hidden;
  }
  .dots{
    position:fixed; inset:0;
    background-image: radial-gradient(rgba(255,255,255,.16) 2px, transparent 2px);
    background-size: 22px 22px;
    pointer-events:none;
    z-index:0;
  }
  .wrap{
    position:relative;
    z-index:1;
    height:100vh;
    height:100dvh;
    max-width:640px;
    margin:0 auto;
    padding: 1.5vh 4vw;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 1.4vh;
    overflow-y:auto;   /* safety net: scroll instead of ever squishing the wheel */
  }
  .logo-banner{
    width:auto;
    max-width:380px;
    max-height:20vh;
    margin: 0 auto;
    border-radius: 16px;
    overflow:hidden;
    box-shadow: 0 14px 30px rgba(0,0,0,.28);
    flex-shrink:0;
  }
  .logo-banner img{ display:block; width:100%; height:100%; object-fit:cover; }

  .tagline{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    color: var(--cream);
    font-size: clamp(16px, 3.6vh, 30px);
    letter-spacing:.5px;
    text-shadow: 0 3px 0 rgba(0,0,0,.18);
    margin:0;
    flex-shrink:0;
  }
  .tagline span{ color: var(--lime); }

  .wheel-stage{
    position:relative;
    /* Width & height are set explicitly (equal px values) by JS on load/resize.
       This guarantees a perfect circle at every browser zoom level — relying on
       aspect-ratio alone can break into an oval at some zoom levels because the
       flex column can still compress this item's height independently of its
       aspect-ratio-derived width. */
    width: 420px;
    height: 420px;
    flex-shrink: 0;   /* never let flexbox squish this item out of being square */
    margin: 0 auto;
  }
  .pointer{
    position:absolute;
    top:-14px; left:50%;
    transform: translateX(-50%);
    width:44px; height:54px;
    z-index:5;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.4));
  }
  .wheel-ring{
    position:absolute; inset:0;
    border-radius:50%;
    padding:10px;
    background: linear-gradient(145deg, var(--lime), #a8b800);
    box-shadow: 0 16px 36px rgba(0,0,0,.35), inset 0 0 0 3px rgba(0,0,0,.15);
  }
  .wheel-img{
    width:100%; height:100%;
    border-radius:50%;
    display:block;
    object-fit:cover;
    will-change: transform;
  }
  .hub-glow{
    position:absolute;
    top:50%; left:50%;
    width:26%; height:26%;
    transform: translate(-50%,-50%);
    border-radius:50%;
    box-shadow: 0 0 0 6px rgba(255,255,255,.08);
    pointer-events:none;
  }

  .spin-btn{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: clamp(15px, 2.6vh, 22px);
    letter-spacing: 1px;
    color:#fff;
    background: linear-gradient(180deg, var(--pink) 0%, var(--pink-dark) 100%);
    border: none;
    border-radius: 999px;
    padding: 1.6vh 44px;
    cursor:pointer;
    box-shadow: 0 8px 0 #8f0b4d, 0 14px 24px rgba(0,0,0,.35);
    transition: transform .08s ease, box-shadow .08s ease;
    flex-shrink:0;
  }
  .spin-btn:active{
    transform: translateY(6px);
    box-shadow: 0 4px 0 #8f0b4d, 0 8px 16px rgba(0,0,0,.3);
  }
  .spin-btn:disabled{
    opacity:.65;
    cursor:default;
  }

  .result-overlay{
    position:fixed; inset:0;
    background: rgba(20,10,25,.66);
    display:flex; align-items:center; justify-content:center;
    z-index:20;
    opacity:0; pointer-events:none;
    transition: opacity .3s ease;
    padding: 20px;
  }
  .result-overlay.show{ opacity:1; pointer-events:auto; }
  .result-card{
    background: var(--cream);
    border-radius:22px;
    padding: 34px 30px 30px;
    max-width: 340px;
    width:100%;
    text-align:center;
    box-shadow: 0 20px 50px rgba(0,0,0,.5);
    transform: scale(.85);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .result-overlay.show .result-card{ transform: scale(1); }
  .result-card .eyebrow{
    font-size:12px; letter-spacing:2px; color: var(--pink-dark);
    font-weight:700; text-transform:uppercase;
  }
  .result-card .prize{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 30px;
    color: var(--ink);
    margin: 8px 0 20px;
    line-height:1.15;
  }
  .result-card .prize span{ color:var(--pink); }
  .result-card button{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:15px;
    color:#fff;
    background: var(--cyan-dark);
    border:none;
    border-radius:999px;
    padding:11px 28px;
    cursor:pointer;
  }

  .footer-note{
    margin:0;
    font-size: clamp(10px, 1.6vh, 12.5px);
    color: rgba(255,255,255,.8);
    flex-shrink:0;
  }
  .footer-note.legal{
    font-size: clamp(8.5px, 1.3vh, 10.5px);
    color: rgba(255,255,255,.62);
    max-width: 380px;
    line-height:1.35;
    font-style: italic;
  }
</style>
</head>

  <div class="footer-note">Tap or click SPIN — one prize per customer.</div>

  <div class="result-card">
    <div class="eyebrow">You won</div>

  </div>

<script>
(function(){
  // ---- Keep the wheel perfectly round & as large as will fit, at any zoom ----
  const wrapEl   = document.querySelector('.wrap');
  const stageEl  = document.querySelector('.wheel-stage');
  const logoEl   = document.querySelector('.logo-banner');
  const taglineEl= document.querySelector('.tagline');
  const btnEl    = document.querySelector('.spin-btn');
  const notesEl  = document.querySelectorAll('.footer-note');

  function sizeWheel(){
    // Temporarily let the stage go small so it doesn't inflate the measurement
    // of how much space the *other* elements need.
    stageEl.style.width = '10px';
    stageEl.style.height = '10px';

    const wrapStyles = getComputedStyle(wrapEl);
    const gap = parseFloat(wrapStyles.rowGap || wrapStyles.gap || '0') || 0;
    const paddingV = parseFloat(wrapStyles.paddingTop) + parseFloat(wrapStyles.paddingBottom);

    let otherHeight = paddingV;
    let count = 0;
    [logoEl, taglineEl, btnEl, ...notesEl].forEach(el => {
      if(el){ otherHeight += el.offsetHeight; count++; }
    });
    otherHeight += gap * count; // gap above each sibling element (approx, incl. wheel's own gaps)

    const availableHeight = wrapEl.clientHeight - otherHeight;
    const availableWidth  = wrapEl.clientWidth * 0.92;

    // Bigger than before (was capped at 420px) — cap raised to 560px.
    let size = Math.min(availableHeight, availableWidth, 560);
    size = Math.max(size, 220); // sensible floor so it never collapses too small

    stageEl.style.width  = size + 'px';
    stageEl.style.height = size + 'px';
  }

  window.addEventListener('load', sizeWheel);
  window.addEventListener('resize', sizeWheel);
  window.addEventListener('orientationchange', sizeWheel);
  // Fonts loading can change sibling heights slightly; re-measure once they're ready.
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(sizeWheel);
  }
  sizeWheel();

  // ---- Segment boundaries measured directly from the wheel artwork ----
  // (the slices are NOT equal sizes — bigger prizes have smaller slices).
  // Angles are degrees, clockwise, measured from 12 o'clock (where the pointer sits).
  const SEGMENTS = [
    { label: "FREE SCOOP",        start: 7.0,   end: 39.0  },
    { label: "40% OFF",           start: 39.0,  end: 61.8  },
    { label: "FREE BLIZZARD",     start: 61.8,  end: 87.5  },
    { label: "15% OFF",           start: 87.5,  end: 145.0 },
    { label: "FREE SOFTSERVE",    start: 145.0, end: 199.3 },
    { label: "FREE CONE",         start: 199.3, end: 225.6 },
    { label: "30% OFF",           start: 225.6, end: 266.6 },
    { label: "25% OFF",           start: 266.6, end: 294.1 },
    { label: "FREE DOUBLE SCOOP", start: 294.1, end: 313.6 },
    { label: "15% OFF",           start: 313.6, end: 367.0 } // wraps past 360 back to 7.0
  ];

  function findSegment(angle){
    // angle is 0-360, clockwise from 12 o'clock
    for(const seg of SEGMENTS){
      if(seg.end <= 360){
        if(angle >= seg.start && angle < seg.end) return seg;
      } else {
        // wrapping segment (crosses the 0/360 boundary)
        if(angle >= seg.start || angle < (seg.end - 360)) return seg;
      }
    }
    return SEGMENTS[0];
  }

  const wheelImg = document.getElementById('wheelImg');
  const spinBtn = document.getElementById('spinBtn');
  const overlay = document.getElementById('resultOverlay');
  const prizeText = document.getElementById('prizeText');
  const closeBtn = document.getElementById('closeBtn');

  let rotation = 0;
  let spinning = false;

  function easeOutQuart(t){ return 1 - Math.pow(1 - t, 4); }

  function spin(){
    if(spinning) return;
    spinning = true;
    spinBtn.disabled = true;

    const extraSpins = 6 + Math.random() * 2;
    const randomOffset = Math.random() * 360;
    const startRotation = rotation;
    const totalDelta = extraSpins * 360 + randomOffset;
    const duration = 4600;
    const startTime = performance.now();

    function frame(now){
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = easeOutQuart(t);
      rotation = startRotation + totalDelta * eased;
      wheelImg.style.transform = `rotate(${rotation}deg)`;

      if(t < 1){
        requestAnimationFrame(frame);
      } else {
        finish();
      }
    }
    requestAnimationFrame(frame);
  }

  function finish(){
    spinning = false;
    spinBtn.disabled = false;
    rotation = rotation % 360;

    // The segment now sitting under the fixed top pointer is the one whose
    // original position ended up at screen-angle 0 after rotating clockwise.
    const effective = ((-rotation) % 360 + 360) % 360;
    const seg = findSegment(effective);

    prizeText.innerHTML = seg.label.replace(/(FREE.*)/, '<span>$1</span>').replace(/(\d+% OFF)/, '<span>$1</span>');
    overlay.classList.add('show');
  }

  spinBtn.addEventListener('click', spin);
  closeBtn.addEventListener('click', () => overlay.classList.remove('show'));
})();
</script>
